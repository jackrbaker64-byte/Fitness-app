<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JRB Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4444;
    --success: #47ff8a;
    --card-radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* HEADER */
  .app-header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--text); }
  .date-badge {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    padding: 12px 4px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* PAGES */
  .page { display: none; padding: 16px 16px 90px; }
  .page.active { display: block; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 16px; margin-bottom: 12px; }
  .workout-status { background: linear-gradient(135deg, #1a1a0a, #141408); border: 1px solid #3a3a10; border-radius: var(--card-radius); padding: 20px; margin-bottom: 16px; position: relative; overflow: hidden; }
  .workout-status.active-workout { border-color: var(--accent); animation: pulse-border 2s infinite; }
  @keyframes pulse-border { 0%, 100% { border-color: var(--accent); } 50% { border-color: #c8e000; } }
  .workout-status-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .workout-status-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: var(--accent); }
  .workout-timer { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }
  .workout-timer.running { color: var(--success); }
  .start-btn { width: 100%; background: var(--accent); color: #0a0a0a; border: none; border-radius: 10px; padding: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; margin-top: 10px; }
  .start-btn:active { transform: scale(0.98); }
  .start-btn.danger { background: var(--danger); color: #fff; }

  .exercise-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .exercise-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .exercise-name { font-weight: 600; font-size: 15px; }
  .exercise-type-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.5px; font-weight: 600; text-transform: uppercase; }
  .badge-strength { background: #1e1e3a; color: #7b8cff; }
  .badge-cardio { background: #3a1e1e; color: var(--accent2); }

  .sets-header { display: grid; grid-template-columns: 32px 1fr 1fr 36px; gap: 6px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; padding: 0 4px; }
  .set-row { display: grid; grid-template-columns: 32px 1fr 1fr 36px; gap: 6px; align-items: center; margin-bottom: 6px; }
  .set-num { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--muted); text-align: center; }
  .set-num.done { color: var(--success); }
  .set-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 15px; font-weight: 600; text-align: center; width: 100%; }
  .set-input:focus { border-color: var(--accent); outline: none; }
  .set-input.done-input { border-color: var(--success); background: #0a1a10; }

  .check-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 16px; }
  .check-btn.done { background: var(--success); border-color: var(--success); color: #0a0a0a; }

  .add-set-btn { background: none; border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); width: 100%; padding: 8px; font-size: 13px; cursor: pointer; margin-top: 4px; }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  .delete-exercise-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px; font-size: 16px; margin-left: 6px; }
  .delete-exercise-btn:hover { color: var(--danger); }

  /* ADD EXERCISE PANEL */
  .add-exercise-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 14px; margin-bottom: 12px; }
  .panel-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .type-toggle { display: flex; gap: 8px; margin-bottom: 10px; }
  .type-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 8px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .type-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1a08; }
  .input-row { margin-bottom: 10px; }
  .input-field { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; }
  .input-field:focus { border-color: var(--accent); outline: none; }
  .add-btn { width: 100%; background: var(--surface2); border: 1px solid var(--accent); border-radius: 8px; color: var(--accent); padding: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; cursor: pointer; }
  .add-btn:active { background: #1a1a08; }

  /* TEMPLATE */
  .template-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s, transform 0.1s; }
  .template-card:active { transform: scale(0.99); border-color: var(--accent); }
  .template-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 6px; }
  .template-exercises { font-size: 12px; color: var(--muted); }
  .template-tag { display: inline-block; background: var(--surface2); border-radius: 5px; padding: 2px 8px; font-size: 11px; color: var(--muted); margin: 2px 2px 2px 0; }

  /* HISTORY */
  .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
  .history-card:hover { border-color: var(--accent); }
  .history-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .history-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }
  .history-date { font-size: 11px; color: var(--muted); text-align: right; }
  .history-meta { display: flex; gap: 14px; margin-top: 8px; }
  .history-meta-item { font-size: 12px; color: var(--muted); }
  .history-meta-item span { color: var(--text); font-weight: 600; }

  /* PROGRESS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 14px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 1px; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .progress-select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; margin-bottom: 14px; font-family: 'DM Sans', sans-serif; }
  .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 16px; }
  .chart-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; margin-bottom: 12px; color: var(--accent); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; margin: 0 auto; max-height: 80vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; }
  .close-btn { background: var(--surface2); border: none; color: var(--text); border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-exercise { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .modal-exercise:last-child { border-bottom: none; }
  .modal-exercise-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .modal-set-row { display: flex; gap: 12px; font-size: 13px; color: var(--muted); padding: 3px 0; }
  .modal-set-row span { color: var(--text); }

  /* TOAST */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--success); color: #0a0a0a; font-weight: 600; font-size: 13px; padding: 10px 20px; border-radius: 30px; z-index: 300; opacity: 0; transition: all 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .workout-name-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; padding: 4px 0 8px; margin-bottom: 10px; }
  .workout-name-input:focus { border-bottom-color: var(--accent); outline: none; }

  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">JRB<span>FITNESS</span></div>
  <div class="date-badge" id="headerDate"></div>
</header>

<!-- LOG PAGE -->
<div class="page active" id="page-log">
  <div style="padding: 16px 0 0;">
    <div class="workout-status" id="workoutStatus">
      <div class="workout-status-label">Status</div>
      <div class="workout-status-title" id="statusTitle">NO ACTIVE WORKOUT</div>
      <div class="workout-timer" id="workoutTimer">00:00:00</div>
    </div>

    <div id="workoutBuilder" style="display:none;">
      <input class="workout-name-input" id="workoutNameInput" placeholder="WORKOUT NAME" maxlength="40">
      <div id="exerciseList"></div>

      <div class="add-exercise-panel">
        <div class="panel-title">+ Add Exercise</div>
        <div class="type-toggle">
          <button class="type-btn active" id="typeBtnStrength" onclick="setExType('strength')">💪 Strength</button>
          <button class="type-btn" id="typeBtnCardio" onclick="setExType('cardio')">🏃 Cardio</button>
        </div>
        <div class="input-row">
          <input class="input-field" id="exNameInput" placeholder="Exercise name..." maxlength="40">
        </div>
        <button class="add-btn" onclick="addExercise()">+ ADD TO WORKOUT</button>
      </div>

      <button class="start-btn danger" onclick="finishWorkout()">⚡ FINISH WORKOUT</button>
    </div>

    <div id="noWorkoutActions">
      <button class="start-btn" onclick="startWorkout()">START WORKOUT</button>
      <div style="margin-top: 10px; text-align: center; font-size: 12px; color: var(--muted);">or load a template from the Templates tab</div>
    </div>
  </div>
</div>

<!-- HISTORY PAGE -->
<div class="page" id="page-history">
  <div class="section-title" style="margin-top: 10px;">HISTORY <span id="historyCount" style="font-size:13px;color:var(--muted);"></span></div>
  <div id="historyList"></div>
</div>

<!-- PROGRESS PAGE -->
<div class="page" id="page-progress">
  <div class="section-title" style="margin-top: 10px;">PROGRESS</div>
  <div class="stats-grid" id="overallStats"></div>
  <select class="progress-select" id="progressExSelect" onchange="renderProgressChart()">
    <option value="">— select exercise —</option>
  </select>
  <div class="chart-container" id="chartContainer" style="display:none;">
    <div class="chart-title" id="chartLabel"></div>
    <canvas id="progressChart" height="180"></canvas>
  </div>
</div>

<!-- TEMPLATES PAGE -->
<div class="page" id="page-templates">
  <div class="section-title" style="margin-top: 10px;">TEMPLATES</div>
  <div id="templateList"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('log', this)">Log</button>
  <button class="nav-btn" onclick="switchPage('history', this)">History</button>
  <button class="nav-btn" onclick="switchPage('progress', this)">Progress</button>
  <button class="nav-btn" onclick="switchPage('templates', this)">Templates</button>
</nav>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div id="modalDate" style="font-size:10px;color:var(--muted);"></div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA & TEMPLATES ───────────────────────────────────────────────
const STORAGE_KEY = 'ironlog_data';

function defaultTemplates() {
  return [
    { id: 't1', name: 'PUSH DAY', exercises: [
        { name: 'Incline Chest Press', type: 'strength' },
        { name: 'Shoulder Press', type: 'strength' },
        { name: 'Tricep Push Downs', type: 'strength' },
        { name: 'Tricep Extension', type: 'strength' },
        { name: 'Single Arm Tricep Push Down', type: 'strength' },
        { name: 'Converging Chest Press', type: 'strength' },
        { name: 'Pec Dec Fly', type: 'strength' },
        { name: 'Lateral Raise', type: 'strength' }
    ]},
    { id: 't2', name: 'PULL DAY', exercises: [
        { name: 'Lat Pulldown Supinated', type: 'strength' },
        { name: 'Lat Pulldown Neutral', type: 'strength' },
        { name: 'Lat Row', type: 'strength' },
        { name: 'Wide Row', type: 'strength' },
        { name: 'Rear Delt Overhead Pullover', type: 'strength' },
        { name: 'Face Pulls', type: 'strength' },
        { name: 'EZ Bar Bicep Curl', type: 'strength' },
        { name: 'Dumbbell Curl', type: 'strength' },
        { name: 'Curl Machine', type: 'strength' },
        { name: 'Rear Delt Fly', type: 'strength' }
    ]},
    { id: 't3', name: 'LEG DAY', exercises: [
        { name: 'Squat', type: 'strength' },
        { name: 'Leg Press', type: 'strength' },
        { name: 'Romanian Deadlift', type: 'strength' },
        { name: 'Leg Curl', type: 'strength' },
        { name: 'Calf Raises', type: 'strength' }
    ]},
    { id: 't4', name: 'CARDIO BLAST', exercises: [
        { name: 'Treadmill Run', type: 'cardio' },
        { name: 'Rowing Machine', type: 'cardio' },
        { name: 'Cycling', type: 'cardio' }
    ]}
  ];
}

let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { workouts: [], templates: defaultTemplates() };
let activeWorkout = null;
let timerInterval = null;
let selectedExType = 'strength';
let progressChart = null;

// ─── HEADER DATE ────────────────────────────────────────────────────
function updateHeaderDate() {
  const now = new Date();
  document.getElementById('headerDate').innerHTML =
    now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) +
    '<br>' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}
updateHeaderDate();
setInterval(updateHeaderDate, 30000);

// ─── NAV ────────────────────────────────────────────────────────────
function switchPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');

  if (id === 'history') renderHistory();
  if (id === 'progress') renderProgress();
  if (id === 'templates') renderTemplates();
}

// ─── WORKOUT FUNCTIONS ─────────────────────────────────────────────
function startWorkout(template = null) {
  activeWorkout = {
    name: template ? template.name : 'WORKOUT',
    startTime: Date.now(),
    exercises: template ? template.exercises.map(e => ({ ...e, id: uid(), sets: [newSet(e.type)] })) : []
  };
  document.getElementById('workoutNameInput').value = activeWorkout.name;
  document.getElementById('noWorkoutActions').style.display = 'none';
  document.getElementById('workoutBuilder').style.display = 'block';
  document.getElementById('workoutStatus').classList.add('active-workout');
  document.getElementById('statusTitle').textContent = activeWorkout.name;
  startTimer();
  renderExercises();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!activeWorkout) return;
    const elapsed = Math.floor((Date.now() - activeWorkout.startTime) / 1000);
    const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
    const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
    const s = (elapsed % 60).toString().padStart(2, '0');
    const el = document.getElementById('workoutTimer');
    el.textContent = `${h}:${m}:${s}`;
    el.classList.add('running');
  }, 1000);
}

function finishWorkout() {
  if (!activeWorkout) return;
  collectExerciseData();
  if (activeWorkout.exercises.length === 0) return showToast('Add at least one exercise!');

  const name = document.getElementById('workoutNameInput').value.trim() || 'WORKOUT';
  const workout = {
    id: uid(),
    name,
    date: new Date().toISOString(),
    duration: Math.floor((Date.now() - activeWorkout.startTime) / 1000),
    exercises: JSON.parse(JSON.stringify(activeWorkout.exercises))
  };
  appData.workouts.unshift(workout);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));

  clearInterval(timerInterval);
  activeWorkout = null;
  document.getElementById('workoutBuilder').style.display = 'none';
  document.getElementById('noWorkoutActions').style.display = 'block';
  document.getElementById('workoutStatus').classList.remove('active-workout');
  document.getElementById('statusTitle').textContent = 'NO ACTIVE WORKOUT';
  document.getElementById('workoutTimer').textContent = '00:00:00';
  document.getElementById('workoutTimer').classList.remove('running');
  showToast('✅ Workout saved!');
}

function collectExerciseData() {
  if (!activeWorkout) return;
  activeWorkout.exercises.forEach((ex, ei) => {
    const rows = document.querySelectorAll(`.set-row[data-ex="${ei}"]`);
    ex.sets = [];
    rows.forEach(row => {
      if (ex.type === 'strength') {
        const wt = row.querySelector('.wt-input')?.value || 0;
        const reps = row.querySelector('.reps-input')?.value || 0;
        const done = row.querySelector('.check-btn').classList.contains('done');
        ex.sets.push({ weight: +wt, reps: +reps, done });
      } else {
        const dist = row.querySelector('.dist-input')?.value || 0;
        const mins = row.querySelector('.mins-input')?.value || 0;
        const done = row.querySelector('.check-btn').classList.contains('done');
        ex.sets.push({ distance: +dist, duration: +mins, done });
      }
    });
  });
}

function setExType(t) {
  selectedExType = t;
  document.getElementById('typeBtnStrength').classList.toggle('active', t === 'strength');
  document.getElementById('typeBtnCardio').classList.toggle('active', t === 'cardio');
}

function addExercise() {
  const name = document.getElementById('exNameInput').value.trim();
  if (!name) return showToast('Enter exercise name');
  collectExerciseData();
  activeWorkout.exercises.push({ id: uid(), name, type: selectedExType, sets: [newSet(selectedExType)] });
  document.getElementById('exNameInput').value = '';
  renderExercises();
}

function newSet(type) {
  return type === 'cardio' ? { distance: '', duration: '', done: false } : { weight: '', reps: '', done: false };
}

function addSet(ei) { collectExerciseData(); activeWorkout.exercises[ei].sets.push(newSet(activeWorkout.exercises[ei].type)); renderExercises(); }
function deleteExercise(ei) { collectExerciseData(); activeWorkout.exercises.splice(ei, 1); renderExercises(); }
function toggleSetDone(ei, si) { collectExerciseData(); activeWorkout.exercises[ei].sets[si].done = !activeWorkout.exercises[ei].sets[si].done; renderExercises(); }

function renderExercises() {
  const container = document.getElementById('exerciseList');
  container.innerHTML = activeWorkout.exercises.map((ex, ei) => {
    const isStrength = ex.type === 'strength';
    let setsHTML = isStrength
      ? `<div class="sets-header"><span>SET</span><span>KG/LBS</span><span>REPS</span><span></span></div>`
      : `<div class="sets-header"><span>SET</span><span>KM/MI</span><span>MINS</span><span></span></div>`;

    ex.sets.forEach((set, si) => {
      const doneClass = set.done ? 'done' : '';
      setsHTML += `
        <div class="set-row" data-ex="${ei}" data-si="${si}">
          <div class="set-num ${doneClass}">${si + 1}</div>
          ${isStrength ? `
            <input class="set-input wt-input ${doneClass ? 'done-input' : ''}" type="number" value="${set.weight || ''}" placeholder="0">
            <input class="set-input reps-input ${doneClass ? 'done-input' : ''}" type="number" value="${set.reps || ''}" placeholder="0">
          ` : `
            <input class="set-input dist-input ${doneClass ? 'done-input' : ''}" type="number" value="${set.distance || ''}" placeholder="0" step="0.1">
            <input class="set-input mins-input ${doneClass ? 'done-input' : ''}" type="number" value="${set.duration || ''}" placeholder="0" step="0.5">
          `}
          <button class="check-btn ${doneClass}" onclick="toggleSetDone(${ei},${si})">✓</button>
        </div>`;
    });

    return `
      <div class="exercise-item">
        <div class="exercise-header">
          <div class="exercise-name">${ex.name}</div>
          <div>
            <span class="exercise-type-badge ${isStrength ? 'badge-strength' : 'badge-cardio'}">${isStrength ? 'strength' : 'cardio'}</span>
            <button class="delete-exercise-btn" onclick="deleteExercise(${ei})">🗑</button>
          </div>
        </div>
        ${setsHTML}
        <button class="add-set-btn" onclick="addSet(${ei})">+ Add Set</button>
      </div>`;
  }).join('');
}

// ─── HISTORY ────────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('historyList');
  const count = document.getElementById('historyCount');
  count.textContent = `(${appData.workouts.length})`;

  if (appData.workouts.length === 0) {
    list.innerHTML = '<div class="empty-state">No workouts logged yet.<br>Start your first workout!</div>';
    return;
  }

  list.innerHTML = appData.workouts.map(w => {
    const date = new Date(w.date);
    const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const dur = formatDuration(w.duration);
    const totalSets = w.exercises.reduce((acc, ex) => acc + ex.sets.length, 0);
    return `
      <div class="history-card" onclick="openModal('${w.id}')">
        <div class="history-card-header">
          <div class="history-name">${w.name}</div>
          <div class="history-date">${dateStr}<br>${timeStr}</div>
        </div>
        <div class="history-meta">
          <div class="history-meta-item">⏱ <span>${dur}</span></div>
          <div class="history-meta-item">🏋️ <span>${w.exercises.length} exercises</span></div>
          <div class="history-meta-item">📋 <span>${totalSets} sets</span></div>
        </div>
      </div>`;
  }).join('');
}

function openModal(wid) {
  const w = appData.workouts.find(x => x.id === wid);
  if (!w) return;
  const date = new Date(w.date);
  document.getElementById('modalDate').textContent =
    date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) +
    ' · ' + formatDuration(w.duration);
  document.getElementById('modalTitle').textContent = w.name;

  document.getElementById('modalContent').innerHTML = w.exercises.map(ex => {
    const isStrength = ex.type === 'strength';
    const setsHTML = ex.sets.map((set, i) => {
      const label = isStrength
        ? `<span>${set.weight || 0} kg</span> × <span>${set.reps || 0} reps</span>`
        : `<span>${set.distance || 0} km</span> · <span>${set.duration || 0} mins</span>`;
      return `<div class="modal-set-row"><span style="color:var(--muted)">Set ${i + 1}</span> ${label} ${set.done ? '✅' : ''}</div>`;
    }).join('');
    return `
      <div class="modal-exercise">
        <div class="modal-exercise-name">${ex.name} <span class="exercise-type-badge ${isStrength ? 'badge-strength' : 'badge-cardio'}">${ex.type}</span></div>
        ${setsHTML}
      </div>`;
  }).join('');

  document.getElementById('historyModal').classList.add('open');
}

function closeModal() {
  document.getElementById('historyModal').classList.remove('open');
}

// ─── PROGRESS ───────────────────────────────────────────────────────
function renderProgress() {
  const workouts = appData.workouts;

  // Overall stats
  const totalSets = workouts.reduce((acc, w) => acc + w.exercises.reduce((a, ex) => a + ex.sets.length, 0), 0);
  const totalDuration = workouts.reduce((acc, w) => acc + (w.duration || 0), 0);
  document.getElementById('overallStats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${workouts.length}</div><div class="stat-label">Workouts</div></div>
    <div class="stat-card"><div class="stat-value">${totalSets}</div><div class="stat-label">Total Sets</div></div>
    <div class="stat-card"><div class="stat-value">${formatDuration(totalDuration)}</div><div class="stat-label">Total Time</div></div>
    <div class="stat-card"><div class="stat-value">${workouts.length > 0 ? formatDuration(Math.round(totalDuration / workouts.length)) : '0m'}</div><div class="stat-label">Avg Duration</div></div>
  `;

  // Build exercise list for select
  const exNames = new Set();
  workouts.forEach(w => w.exercises.forEach(ex => {
    if (ex.type === 'strength') exNames.add(ex.name);
  }));
  const sel = document.getElementById('progressExSelect');
  const current = sel.value;
  sel.innerHTML = '<option value="">— select exercise —</option>';
  [...exNames].sort().forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === current) opt.selected = true;
    sel.appendChild(opt);
  });

  if (current && exNames.has(current)) renderProgressChart();
}

function renderProgressChart() {
  const exName = document.getElementById('progressExSelect').value;
  const container = document.getElementById('chartContainer');
  if (!exName) { container.style.display = 'none'; return; }

  // Gather max weight per workout session for this exercise
  const points = [];
  [...appData.workouts].reverse().forEach(w => {
    const ex = w.exercises.find(e => e.name === exName && e.type === 'strength');
    if (ex) {
      const maxWeight = Math.max(...ex.sets.map(s => +s.weight || 0));
      const date = new Date(w.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      points.push({ date, weight: maxWeight });
    }
  });

  if (points.length === 0) { container.style.display = 'none'; return; }

  container.style.display = 'block';
  document.getElementById('chartLabel').textContent = exName + ' — Max Weight';

  const canvas = document.getElementById('progressChart');
  const ctx = canvas.getContext('2d');

  // Destroy old chart if exists
  if (progressChart) { progressChart.destroy(); progressChart = null; }

  // Simple canvas chart
  const W = canvas.offsetWidth || 300;
  canvas.width = W;
  canvas.height = 180;
  ctx.clearRect(0, 0, W, 180);

  const pad = { top: 10, right: 16, bottom: 30, left: 40 };
  const cw = W - pad.left - pad.right;
  const ch = 180 - pad.top - pad.bottom;

  const weights = points.map(p => p.weight);
  const maxW = Math.max(...weights) * 1.1 || 10;
  const minW = Math.min(...weights) * 0.9;

  const xStep = points.length > 1 ? cw / (points.length - 1) : cw;

  // Grid lines
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch - (i / 4) * ch;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    ctx.fillStyle = '#666';
    ctx.font = '10px DM Sans, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(minW + (maxW - minW) * (i / 4)), pad.left - 4, y + 4);
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#e8ff47';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  points.forEach((p, i) => {
    const x = pad.left + (points.length > 1 ? i * xStep : cw / 2);
    const y = pad.top + ch - ((p.weight - minW) / (maxW - minW || 1)) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots + labels
  points.forEach((p, i) => {
    const x = pad.left + (points.length > 1 ? i * xStep : cw / 2);
    const y = pad.top + ch - ((p.weight - minW) / (maxW - minW || 1)) * ch;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#e8ff47';
    ctx.fill();

    // X-axis labels (show every nth to avoid crowding)
    if (i % Math.ceil(points.length / 6) === 0 || i === points.length - 1) {
      ctx.fillStyle = '#666';
      ctx.font = '9px DM Sans, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.date, x, 180 - 4);
    }
  });
}

// ─── TEMPLATES ──────────────────────────────────────────────────────
function renderTemplates() {
  document.getElementById('templateList').innerHTML = appData.templates.map(t => `
    <div class="template-card" onclick="loadTemplate('${t.id}')">
      <div class="template-name">${t.name}</div>
      <div class="template-exercises">${t.exercises.map(e => `<span class="template-tag">${e.name}</span>`).join('')}</div>
    </div>
  `).join('');
}

function loadTemplate(tid) {
  const template = appData.templates.find(t => t.id === tid);
  if (!template) return;
  if (activeWorkout && !confirm('Replace current workout?')) return;
  if (activeWorkout) clearInterval(timerInterval);
  switchPage('log', document.querySelectorAll('.nav-btn')[0]);
  startWorkout(template);
  showToast(`Loaded ${template.name}`);
}

// ─── UTILS ──────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2, 9); }

function formatDuration(secs) {
  if (!secs || secs < 60) return `${secs || 0}s`;
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('historyModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Init
renderTemplates();
</script>
